<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>Workfolio – Manage Projects Efficiently</title>
    <meta name="description" content="Workfolio is a powerful project management app to track tasks, teams, and productivity in one place." />
    <meta name="keywords" content="project management, task manager, team collaboration, productivity app" />
    <meta name="author" content="Your Name or Company" />
    <link rel="canonical" href="https://trackerfolio-delta.vercel.app/" />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="Workfolio – Manage Projects Efficiently" />
    <meta property="og:description" content="Track projects, manage teams, and boost productivity with Workfolio." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Workfolio – Manage Projects Efficiently" />
    <meta name="twitter:description" content="Smart project management for modern teams." />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.png" />

    <!-- Favicon + Manifest -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0d6efd" />

    <!-- Structured Data (BIG SEO BOOST) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Workfolio",
        "url": "https://trackerfolio-delta.vercel.app/",
        "description": "A project management platform to manage tasks, teams and workflows."
      }
    </script>
  </head>

  <body>
    <noscript>
      Workfolio is a project management app. Please enable JavaScript to use the application.
    </noscript>

    <!-- SEO fallback content -->
    <div id="root">
      <h1>Workfolio Project Management App</h1>
      <p>Manage your projects, teams, and tasks efficiently using Workfolio.</p>
    </div>

    <script type="module" src="/src/index.js"></script>
  </body>
</html>
